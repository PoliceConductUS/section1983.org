  <line x1="120" y1="130" x2="120" y2="670" class="grid" />
  <line x1="197" y1="130" x2="197" y2="670" class="grid" />
  <line x1="274" y1="130" x2="274" y2="670" class="grid" />
  <line x1="351" y1="130" x2="351" y2="670" class="grid" />
  <line x1="428" y1="130" x2="428" y2="670" class="grid" />
  <line x1="505" y1="130" x2="505" y2="670" class="grid" />
  <line x1="582" y1="130" x2="582" y2="670" class="grid" />
