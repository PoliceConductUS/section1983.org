<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">Section 1983 is getting harder to win</title>
  <desc id="desc">A chart with year on the horizontal axis and barriers to win on the vertical axis, showing how courts added court-created barriers to Section 1983 from Monroe in 1961 through Vega in 2022, including Devenpeck and Nieves as probable-cause barriers.</desc>
  <style>
    text { font-family: Georgia, "Times New Roman", serif; fill: #122033; }
    .axis { stroke: #20324a; stroke-width: 3; }
    .grid { stroke: #d8e0e8; stroke-width: 1; }
    .line { fill: none; stroke: #9e2f2f; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .marker { fill: #9e2f2f; stroke: #fff8ef; stroke-width: 4; }
    .marker-label { font-size: 15px; font-weight: 700; fill: #fffdf8; text-anchor: middle; dominant-baseline: middle; }
    .axis-label { font-size: 24px; font-weight: 700; }
    .tick { font-size: 18px; }
    .year { font-size: 18px; font-weight: 700; text-anchor: middle; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #4a5b72; }
  </style>

  <rect width="1200" height="780" fill="#fffdf8" />

  <text x="90" y="70" class="title">Section 1983 Is Getting Harder to Win</text>
  <text x="90" y="102" class="subtitle">Monroe marks the modern starting point. Later courts add court-created barriers one by one.</text>

  <line x1="120" y1="670" x2="1120" y2="670" class="axis" />
  <line x1="120" y1="670" x2="120" y2="130" class="axis" />

  <line x1="120" y1="670" x2="1120" y2="670" class="grid" />
